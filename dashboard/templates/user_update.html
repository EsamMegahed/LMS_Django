{% extends 'dashboard_base.html' %}
{% load static %}
{% load bootstrap4 %}
{% block content %}

<div class="container">
    <h1 class="breadcrumb-title" style="padding-left: 20px;border:none;">User Edite</h1>
    <form method="Post" class='edit-profile m-b30'>
        {% csrf_token %}
        {% bootstrap_form form %}
        <button class="btn btn-lg text-white " style="width: 100%;" type="submit">Save Changes</button>
    </form>
</div>
{% endblock %}
